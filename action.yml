name: Alpine Package Builder
description: 'Builds an Alpine Linux package with the specified version'

author: Adam Jensen <acjensen@gmail.com>

secrets:
  - GITHUB_TOKEN
  - RSA_PRIVATE_KEY
  - RSA_PUBLIC_KEY

inputs:
  package_path:
    description: 'Path to the package to build (e.g., main/nginx)'
    required: true
  release_version:
    description: 'The version number to use when building the package'
    required: true
  rsa_private_key:
    description: 'The private key contents (from secrets)'
    required: true
  rsa_public_key:
    description: 'The public key contents (from secrets)'
    required: true

runs:
  using: 'docker'
  image: 'Dockerfile'

branding:
  icon: 'git-commit'
  color: blue
